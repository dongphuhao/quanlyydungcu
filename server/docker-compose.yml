services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quanlyydungcu
    ports:
      - '5432:5432'
    volumes:
      - quanlyydungcu_pgdata:/var/lib/postgresql/data

volumes:
  quanlyydungcu_pgdata:
